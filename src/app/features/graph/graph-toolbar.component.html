<div class="toolbar">
  <button class="tb-btn" (click)="zoomOut.emit()" title="Zoom Out">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>
  <span class="zoom-level">{{ (zoom() * 100).toFixed(0) }}%</span>
  <button class="tb-btn" (click)="zoomIn.emit()" title="Zoom In">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>
  <button class="tb-btn" (click)="zoomReset.emit()" title="Reset Zoom">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
  </button>

  <div class="toolbar-divider"></div>

  <div style="position:relative">
    <button class="tb-btn" [class.active]="showLayouts" (click)="toggleLayouts()" title="Layout">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </button>
    @if (showLayouts) {
      <div class="popover">
        <div class="layout-grid">
          <div class="layout-btn" [class.active]="layout()==='force'" (click)="selectLayout('force')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="6" r="2"/><circle cx="17" cy="6" r="2"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/><line x1="9" y1="6" x2="15" y2="6"/><line x1="7" y1="8" x2="7" y2="16"/><line x1="17" y1="8" x2="17" y2="16"/><line x1="9" y1="18" x2="15" y2="18"/></svg>
            <span>Force</span>
          </div>
          <div class="layout-btn" [class.active]="layout()==='grid'" (click)="selectLayout('grid')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span>Grid</span>
          </div>
          <div class="layout-btn" [class.active]="layout()==='radial'" (click)="selectLayout('radial')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="19" r="1.5"/><circle cx="5" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
            <span>Radial</span>
          </div>
          <div class="layout-btn" [class.active]="layout()==='circular'" (click)="selectLayout('circular')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="6" r="1.5"/><circle cx="12" cy="18" r="1.5"/><circle cx="6" cy="12" r="1.5"/><circle cx="18" cy="12" r="1.5"/></svg>
            <span>Circular</span>
          </div>
        </div>
      </div>
    }
  </div>

  <div class="toolbar-divider"></div>

  <div style="position:relative">
    <button class="tb-btn" [class.active]="showSettings" (click)="toggleSettingsPopover()" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    @if (showSettings) {
      <div class="popover" style="min-width:220px">
        <div class="popover-item">
          <label class="settings-toggle">
            <span>Show edge labels</span>
            <input type="checkbox" checked>
            <div class="track"><div class="thumb"></div></div>
          </label>
        </div>
        <div class="popover-item">
          <label class="settings-toggle">
            <span>Physics</span>
            <input type="checkbox" checked>
            <div class="track"><div class="thumb"></div></div>
          </label>
        </div>
        <div class="popover-item">
          <label class="settings-toggle">
            <span>Auto center</span>
            <input type="checkbox" checked>
            <div class="track"><div class="thumb"></div></div>
          </label>
        </div>
        <div class="popover-item">
          <label class="settings-toggle">
            <span>Dark nodes</span>
            <input type="checkbox">
            <div class="track"><div class="thumb"></div></div>
          </label>
        </div>
      </div>
    }
  </div>

  <div class="toolbar-divider"></div>

  <button class="tb-btn" (click)="toggleLegend.emit()" title="Toggle Legend">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 4h20"/><path d="M2 9h20"/><path d="M2 14h12"/><path d="M2 19h8"/><circle cx="19" cy="14" r="1.5" fill="currentColor"/><circle cx="16" cy="19" r="1.5" fill="currentColor"/></svg>
  </button>
  <button class="tb-btn" (click)="fullscreen.emit()" title="Fullscreen">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
  </button>

  <div class="toolbar-divider"></div>

  <button class="tb-btn" (click)="showCounts = !showCounts" title="Node & Edge Count">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="2"/><circle cx="16" cy="7" r="2"/><circle cx="7" cy="16" r="2"/><circle cx="16" cy="16" r="2"/></svg>
    @if (showCounts) {
      <span style="position:absolute;top:-20px;font-size:10px;color:var(--text-muted);white-space:nowrap">{{ nodeCount() }} nodes · {{ edgeCount() }} edges</span>
    }
  </button>
</div>
